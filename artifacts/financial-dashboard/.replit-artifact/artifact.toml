kind = "web"
  previewPath = "/"
  title = "Financial Market Tracker"
  version = "1.0.0"
  id = "artifacts/financial-dashboard"
  deploymentTarget = "vm"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 18955

  [services.development]
  run = "gunicorn --chdir /home/runner/workspace/dashboard -c /home/runner/workspace/dashboard/gunicorn.conf.py app:app"

  [services.production.run]
  args = ["gunicorn", "--chdir", "/home/runner/workspace/dashboard", "-c", "/home/runner/workspace/dashboard/gunicorn.conf.py", "app:app"]

  [services.production.run.env]
  PORT = "18955"
  